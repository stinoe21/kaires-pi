<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kaires — Pi Player</title>
<style>
  :root {
    --cyan: #1d8ead;
    --cyan-dark: #17768f;
    --cream: #fbfae9;
    --black: #1f1d1e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: var(--black);
    color: var(--cream);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  .panel {
    width: min(640px, 92vw);
    padding: 2.5rem 2rem;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    backdrop-filter: blur(20px);
    text-align: center;
  }
  .brand {
    font-size: 0.75rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 1rem;
  }
  h1 { font-weight: 400; font-size: 1.4rem; margin: 0 0 0.4rem; }
  .artist { color: rgba(251, 250, 233, 0.6); font-size: 1rem; margin-bottom: 1.5rem; }
  audio { width: 100%; margin: 1rem 0; }
  audio::-webkit-media-controls-panel { background: rgba(255, 255, 255, 0.05); }
  .meta {
    display: flex; justify-content: center; gap: 2rem;
    font-size: 0.8rem; color: rgba(251, 250, 233, 0.5);
    margin-top: 1rem;
  }
  .status {
    margin-top: 1.5rem;
    font-size: 0.75rem;
    color: rgba(251, 250, 233, 0.4);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .status.error { color: #ff8a80; }
  .pulse {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: var(--cyan);
    animation: pulse 1.5s ease-in-out infinite;
    margin-right: 6px; vertical-align: middle;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.85); }
  }
</style>
</head>
<body>
<main class="panel">
  <div class="brand">Kaires · Pi Player</div>
  <h1 id="title">Wacht op track...</h1>
  <div class="artist" id="artist"></div>
  <audio id="player" controls></audio>
  <div class="meta">
    <span>CAS <span id="cas">—</span></span>
    <span id="trackId">—</span>
  </div>
  <div class="status" id="status"><span class="pulse"></span>verbonden met Pi</div>
</main>

<script>
const POLL_RETRY_MS = 2000;

const $title  = document.getElementById('title');
const $artist = document.getElementById('artist');
const $player = document.getElementById('player');
const $cas    = document.getElementById('cas');
const $tid    = document.getElementById('trackId');
const $status = document.getElementById('status');

let currentTrackId = null;

function setStatus(msg, isError = false) {
  $status.innerHTML = (isError ? '' : '<span class="pulse"></span>') + msg;
  $status.classList.toggle('error', isError);
}

async function loadNext() {
  try {
    const r = await fetch('/api/now-playing', { cache: 'no-store' });
    if (r.status === 204) {
      setStatus(`geen track in queue, retry over ${POLL_RETRY_MS / 1000}s`);
      setTimeout(loadNext, POLL_RETRY_MS);
      return;
    }
    if (!r.ok) {
      setStatus(`server error ${r.status}, retry over 5s`, true);
      setTimeout(loadNext, 5000);
      return;
    }
    const track = await r.json();

    // Skip als we deze track al spelen (browser polled een keer extra)
    if (track.id && track.id === currentTrackId) {
      setTimeout(loadNext, POLL_RETRY_MS);
      return;
    }

    currentTrackId = track.id;
    $title.textContent  = track.title  || '(geen titel)';
    $artist.textContent = track.artist || '(onbekende artiest)';
    $cas.textContent    = track.cas != null ? track.cas.toFixed(2) : '—';
    $tid.textContent    = track.id ? track.id.slice(0, 8) : '—';
    $player.src = track.url;

    try {
      await $player.play();
      setStatus('aan het afspelen');
    } catch (err) {
      setStatus('klik play (browser blokkeert autoplay)', true);
    }
  } catch (err) {
    setStatus(`netwerk-fout: ${err.message}, retry over 5s`, true);
    setTimeout(loadNext, 5000);
  }
}

$player.addEventListener('ended', async () => {
  setStatus('track klaar, ack naar Pi');
  try {
    await fetch('/api/track-ended', { method: 'POST' });
  } catch (err) {
    console.warn('track-ended ack faalde:', err);
  }
  // Korte pause zodat Pi de queue kan refilen
  setTimeout(loadNext, 500);
});

$player.addEventListener('error', () => {
  setStatus('audio-fout — volgende track over 3s', true);
  currentTrackId = null;
  setTimeout(loadNext, 3000);
});

// Initial load
loadNext();
</script>
</body>
</html>
